services:
  document-api:
    build:
      context: ../../
      dockerfile: src/dotnet/services/DocumentService/Aize.DocumentService.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      OpenApi__Enabled: "true"
      PythonProcessor__BaseUrl: http://python-processor:8001
      LocalBlobStorage__RootPath: /shared/blob-storage
    ports:
      - "${DOCUMENT_API_PORT:-5050}:8080"
    volumes:
      - shared-blob-storage:/shared/blob-storage

  python-processor:
    build:
      context: ../../src/python/document_processor
      dockerfile: Dockerfile
    environment:
      DOCUMENT_API_BASE_URL: http://document-api:8080
    ports:
      - "${PYTHON_PROCESSOR_PORT:-8002}:8001"
    volumes:
      - shared-blob-storage:/shared/blob-storage

  pid-portal:
    build:
      context: ../../src/web/pid-portal
      dockerfile: Dockerfile
    environment:
      VITE_DOCUMENT_API_BASE_URL: "http://localhost:${DOCUMENT_API_PORT:-5050}"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - document-api

volumes:
  shared-blob-storage:

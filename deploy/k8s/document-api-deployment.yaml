apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-api
  namespace: aize-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-api
  template:
    metadata:
      labels:
        app: document-api
    spec:
      containers:
        - name: document-api
          image: ghcr.io/your-org/document-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: PythonProcessor__BaseUrl
              value: http://python-processor:8001
            - name: LocalBlobStorage__RootPath
              value: /shared/blob-storage
---
apiVersion: v1
kind: Service
metadata:
  name: document-api
  namespace: aize-pipeline
spec:
  selector:
    app: document-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
